<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>CHONNECT by Kachoo</title>
  <!-- Google Fonts: Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* RESET & DASAR - putih bersih */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: #ffffff;
      color: #000000;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* SPLASH PUTIH (gradasi putih ke abu sangat tipis) */
    .splash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(145deg, #ffffff 0%, #f5f5f5 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      opacity: 1;
      transition: opacity 0.6s ease-out;
      pointer-events: none;
    }

    .splash.fade-out {
      opacity: 0;
    }

    .splash-logo {
      width: 220px; /* sedikit lebih besar dari sebelumnya */
      max-width: 60vw;
      height: auto;
      aspect-ratio: 1/1;
      object-fit: contain;
      filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.05));
      animation: splashPulse 2s infinite alternate ease-in-out;
    }

    @keyframes splashPulse {
      0% { transform: scale(0.98); opacity: 0.9; }
      100% { transform: scale(1.02); opacity: 1; }
    }

    /* KONTEN UTAMA */
    #content {
      display: none;
      max-width: 1200px;
      margin: 0 auto;
      padding: 1rem 1rem 2rem;
      width: 100%;
      flex: 1;
    }

    /* HEADER - hanya logo (lebih besar, tanpa teks CHONNECT) */
    .header {
      display: flex;
      justify-content: center;  /* logo di tengah */
      align-items: center;
      margin: 0.5rem 0 2rem 0;
    }

    .header-logo {
      width: 100px;  /* ukuran sedang, nyaman di mobile */
      height: auto;
      aspect-ratio: 1/1;
      object-fit: contain;
      border-radius: 20px;  /* lembut */
      background-color: #ffffff;
      padding: 6px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04);
    }

    /* KATEGORI BUTTON - grid lebih rapat untuk mobile */
    .category-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr); /* 2 kolom di mobile */
      gap: 0.7rem;
      margin-bottom: 2rem;
    }

    .cat-btn {
      background: white;
      border: 1.8px solid black;
      padding: 0.8rem 0.2rem;
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      text-transform: uppercase;
      font-size: 0.9rem;
      letter-spacing: 0.3px;
      color: black;
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 3px 0 black;
      width: 100%;
      white-space: normal;
      word-break: keep-all;
      line-height: 1.3;
    }

    .cat-btn:active {
      transform: translateY(3px);
      box-shadow: none;
    }

    /* AREA LIST USER - hanya muncul setelah klik */
    .list-container {
      margin: 1rem 0 2.5rem;
      min-height: 200px;
    }

    .list-title {
      font-weight: 700;
      text-transform: uppercase;
      font-size: 1.1rem;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid black;
      display: inline-block;
    }

    .user-grid {
      display: grid;
      grid-template-columns: 1fr; /* 1 kolom di mobile */
      gap: 1rem;
    }

    /* CARD USER - nyaman di mobile */
    .user-item {
      background: #ffffff;
      border: 1px solid #eaeaea;
      border-radius: 20px;
      padding: 0;
      transition: all 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    }

    .user-item:hover {
      border-color: black;
      background: #fcfcfc;
    }

    .user-link-card {
      text-decoration: none;
      color: inherit;
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.8rem;
      width: 100%;
    }

    .user-logo {
      width: 52px;
      height: 52px;
      border-radius: 16px;  /* sedikit kotak, seperti di contoh */
      object-fit: cover;
      background: #f8f8f8;
      border: 1px solid #eee;
      flex-shrink: 0;
    }

    .user-info {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
      flex: 1;
    }

    .user-name-row {
      display: flex;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 0.3rem 0.6rem;
    }

    .user-name {
      font-weight: 700;  /* bold untuk nama */
      font-size: 1rem;
      color: black;
    }

    .user-username {
      font-weight: 400;  /* normal untuk @username */
      font-size: 0.85rem;
      color: #555;
    }

    .user-bio {
      font-weight: 400;
      font-size: 0.85rem;
      color: #666;
      line-height: 1.3;
    }

    /* FOOTER - persis seperti contoh thekachoo.github.io/Home/ (tanpa simbol/emoji) */
    footer {
      margin-top: 3rem;
      padding: 2rem 0 1rem;
      border-top: 1px solid #ddd;
      font-size: 0.9rem;
      color: #333;
    }

    .footer-container {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .footer-row-1 {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .footer-row-1 .roleplay {
      font-weight: 700;
      text-transform: uppercase;
      font-size: 0.9rem;
      letter-spacing: 0.3px;
      color: black;
    }

    .footer-row-1 .featured {
      font-weight: 400;
      text-transform: uppercase;
      font-size: 0.85rem;
      color: #444;
    }

    .footer-address {
      font-style: normal;
      line-height: 1.6;
      color: #333;
      font-weight: 400;
      max-width: 450px;
    }

    .footer-links {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .footer-links a {
      color: black;
      text-decoration: none;
      font-weight: 400;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
    }

    .footer-links a:hover {
      border-bottom: 1px solid black;
    }

    .footer-links strong {
      font-weight: 700;
      text-transform: uppercase;
      margin-right: 0.4rem;
      font-size: 0.85rem;
    }

    /* Responsive untuk tablet/desktop */
    @media (min-width: 600px) {
      .category-grid {
        grid-template-columns: repeat(3, 1fr); /* 3 kolom di tablet */
        gap: 1rem;
      }

      .user-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .cat-btn {
        padding: 1rem 0.5rem;
        font-size: 1rem;
      }
    }

    @media (min-width: 900px) {
      .category-grid {
        grid-template-columns: repeat(6, 1fr); /* 6 kolom di desktop */
      }

      .user-grid {
        grid-template-columns: repeat(3, 1fr);
      }

      .footer-container {
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: space-between;
        align-items: flex-start;
      }

      .footer-links {
        flex-direction: row;
        gap: 2rem;
      }

      .header-logo {
        width: 110px;  /* sedikit lebih besar di desktop */
      }
    }

    /* Utility */
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <!-- SPLASH dengan gradasi putih dan logo -->
  <div id="splash" class="splash">
    <img src="logo.png" alt="CHONNECT logo" class="splash-logo" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22800%22%20height%3D%22800%22%20viewBox%3D%220%200%20800%20800%22%3E%3Crect%20width%3D%22800%22%20height%3D%22800%22%20fill%3D%22%23f0f0f0%22%2F%3E%3Ctext%20x%3D%22400%22%20y%3D%22420%22%20font-family%3D%22Outfit%2C%20sans-serif%22%20font-size%3D%2270%22%20fill%3D%22%23333%22%20text-anchor%3D%22middle%22%20dominant-baseline%3D%22middle%22%3ECHONNECT%3C%2Ftext%3E%3C%2Fsvg%3E');">
  </div>

  <!-- KONTEN UTAMA -->
  <div id="content">
    <!-- HEADER hanya logo (lebih besar) -->
    <header class="header">
      <img src="logo.png" alt="CHONNECT" class="header-logo" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22800%22%20height%3D%22800%22%20viewBox%3D%220%200%20800%20800%22%3E%3Crect%20width%3D%22800%22%20height%3D%22800%22%20fill%3D%22%23e0e0e0%22%2F%3E%3Ctext%20x%3D%22400%22%20y%3D%22420%22%20font-family%3D%22Outfit%2C%20sans-serif%22%20font-size%3D%2260%22%20fill%3D%22%23333%22%20text-anchor%3D%22middle%22%20dominant-baseline%3D%22middle%22%3ELOGO%3C%2Ftext%3E%3C%2Fsvg%3E');">
    </header>

    <main>
      <!-- 6 tombol kategori -->
      <div class="category-grid">
        <button class="cat-btn" data-category="entertainment">ENTERTAINMENT</button>
        <button class="cat-btn" data-category="institusi">INSTITUSI & ORGANISASI</button>
        <button class="cat-btn" data-category="media">MEDIA & KOMUNIKASI</button>
        <button class="cat-btn" data-category="bisnis">BISNIS & USAHA</button>
        <button class="cat-btn" data-category="keluarga">KELUARGA</button>
        <button class="cat-btn" data-category="lainnya">LAINNYA</button>
      </div>

      <!-- area list username (awal kosong) -->
      <div class="list-container">
        <div class="list-title" id="active-category-title">PILIH KATEGORI</div>
        <div id="user-list" class="user-grid">
          <!-- kosong, akan diisi javascript -->
        </div>
      </div>
    </main>

    <!-- FOOTER sesuai contoh thekachoo.github.io/Home/ -->
    <footer>
      <div class="footer-container">
        <div class="footer-row-1">
          <div class="roleplay">FOR ROLEPLAY PURPOSE ONLY</div>
          <div class="featured">FEATURED BY THE KACHOO</div>
        </div>
        
        <div class="footer-address">
          Jenderal Sudirman Avenue, Lots 61–62, South Jakarta 12930, Indonesia
        </div>
        
        <div class="footer-links">
          <div><strong>OFFICIAL KACHOO</strong> <a href="https://x.com/TheKachoo" target="_blank" rel="noopener">@TheKachoo</a></div>
          <div><strong>NARAHUBUNG</strong> <a href="https://x.com/HaiKachoo" target="_blank" rel="noopener">@HaiKachoo</a></div>
        </div>
      </div>
    </footer>
  </div>

  <script>
    (function() {
      // ========== SPLASH ==========
      const splash = document.getElementById('splash');
      const content = document.getElementById('content');

      function hideSplashAndShowContent() {
        splash.classList.add('fade-out');
        splash.addEventListener('transitionend', function() {
          splash.style.display = 'none';
          content.style.display = 'block';
        }, { once: true });
      }

      window.addEventListener('load', function() {
        setTimeout(hideSplashAndShowContent, 1500);
      });

      // ========== DATA USER ==========
      const userData = {
        entertainment: [
          { name: 'The Kachoo', username: '@TheKachoo', bio: 'Media & Berita' },
          { name: 'Kachoo Music', username: '@KachooMusic', bio: 'Label Independen' },
          { name: 'Kachoo TV', username: '@KachooTV', bio: 'Hiburan Digital' },
          { name: 'Kachoo Play', username: '@KachooPlay', bio: 'Game & Komunitas' },
          { name: 'Kachoo Laughs', username: '@KachooLaughs', bio: 'Komedi & Lucu' }
        ],
        institusi: [
          { name: 'Kachoo University', username: '@KachooUniv', bio: 'Pendidikan & Riset' },
          { name: 'Kachoo Org', username: '@KachooOrg', bio: 'Organisasi Sosial' },
          { name: 'Kachoo Institute', username: '@KachooLP', bio: 'Pelatihan & Sertifikasi' },
          { name: 'Kachoo Foundation', username: '@KachooFDN', bio: 'Nirlaba' },
          { name: 'Kachoo Youth', username: '@KachooYouth', bio: 'Komunitas Pemuda' }
        ],
        media: [
          { name: 'Kachoo Daily', username: '@KachooDaily', bio: 'Berita Harian' },
          { name: 'Kachoo News', username: '@KachooNews', bio: 'Investigasi' },
          { name: 'Kachoo Podcast', username: '@KachooPod', bio: 'Obrolan & Wawancara' },
          { name: 'Kachoo Review', username: '@KachooReview', bio: 'Ulasan' },
          { name: 'Kachoo Tekno', username: '@KachooTekno', bio: 'Teknologi' }
        ],
        bisnis: [
          { name: 'Kachoo Startup', username: '@KachooStartup', bio: 'Inkubator Bisnis' },
          { name: 'Kachoo Mart', username: '@KachooMart', bio: 'Toko Serba Ada' },
          { name: 'Kachoo Biz', username: '@KachooBizID', bio: 'Konsultan UMKM' },
          { name: 'Kachoo Finance', username: '@KachooFinance', bio: 'Tips Keuangan' },
          { name: 'Kachoo Creative', username: '@KachooCreative', bio: 'Agensi Kreatif' }
        ],
        keluarga: [
          { name: 'Keluarga Kachoo', username: '@KachooFamily', bio: 'Vlog Keluarga' },
          { name: 'Bunda Kachoo', username: '@BundaKachoo', bio: 'Parenting' },
          { name: 'Ayah Kachoo', username: '@AyahKachoo', bio: 'Edukasi Ayah' },
          { name: 'Si Kecil Kachoo', username: '@SiKecilKachoo', bio: 'Cerita Anak' },
          { name: 'Kachoo Sahabat', username: '@KachooSahabat', bio: 'Sahabat Keluarga' }
        ],
        lainnya: [
          { name: 'Kachoo Lain', username: '@KachooLain', bio: 'Kategori Lainnya' },
          { name: 'Kachoo Random', username: '@KachooRandom', bio: 'Aneka Rupa' },
          { name: 'Kachoo Stuff', username: '@KachooStuff', bio: 'Jualan Unik' },
          { name: 'Kachoo Hobi', username: '@KachooHobi', bio: 'Komunitas Hobi' },
          { name: 'Kachoo Kuliner', username: '@KachooKuliner', bio: 'Review Makanan' }
        ]
      };

      const categoryNames = {
        entertainment: 'ENTERTAINMENT',
        institusi: 'INSTITUSI & ORGANISASI',
        media: 'MEDIA & KOMUNIKASI',
        bisnis: 'BISNIS & USAHA',
        keluarga: 'KELUARGA',
        lainnya: 'LAINNYA'
      };

      const userListDiv = document.getElementById('user-list');
      const categoryTitle = document.getElementById('active-category-title');

      // Fungsi render: hanya muncul setelah tombol diklik
      function renderCategory(categoryKey) {
        const items = userData[categoryKey] || [];
        const titleText = categoryNames[categoryKey] || 'KATEGORI';
        categoryTitle.textContent = titleText;  // tanpa emoji/simbol

        if (!items.length) {
          userListDiv.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:2rem; color:#666;">Belum ada entri</div>';
          return;
        }

        let htmlString = '';
        items.forEach(item => {
          const cleanUsername = item.username.startsWith('@') ? item.username.slice(1) : item.username;
          const profileUrl = `https://x.com/${cleanUsername}`;

          htmlString += `
            <div class="user-item">
              <a href="${profileUrl}" class="user-link-card" target="_blank" rel="noopener">
                <img src="logo.png" alt="logo" class="user-logo" 
                     onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22800%22%20height%3D%22800%22%20viewBox%3D%220%200%20800%20800%22%3E%3Crect%20width%3D%22800%22%20height%3D%22800%22%20fill%3D%22%23f0f0f0%22%2F%3E%3Ctext%20x%3D%22400%22%20y%3D%22420%22%20font-family%3D%22Outfit%2C%20sans-serif%22%20font-size%3D%2250%22%20fill%3D%22%23999%22%20text-anchor%3D%22middle%22%20dominant-baseline%3D%22middle%22%3E%3C%2Ftext%3E%3C%2Fsvg%3E');">
                <div class="user-info">
                  <div class="user-name-row">
                    <span class="user-name">${item.name}</span>
                    <span class="user-username">${item.username}</span>
                  </div>
                  <div class="user-bio">${item.bio}</div>
                </div>
              </a>
            </div>
          `;
        });

        userListDiv.innerHTML = htmlString;
      }

      // Event listener untuk tombol kategori
      const buttons = document.querySelectorAll('.cat-btn');
      buttons.forEach(btn => {
        btn.addEventListener('click', function(e) {
          const category = this.dataset.category;
          renderCategory(category);
        });
      });

      // Saat content pertama tampil, daftar kosong (tidak otomatis muncul)
      // Kita hanya mengosongkan list
      userListDiv.innerHTML = ''; // kosong
      categoryTitle.textContent = 'PILIH KATEGORI';

      // Observer untuk memastikan setelah splash konten siap
      const contentObserver = new MutationObserver(function(mutations) {
        mutations.forEach(function(mutation) {
          if (mutation.attributeName === 'style' && content.style.display === 'block') {
            // Pastikan list kosong
            userListDiv.innerHTML = '';
            categoryTitle.textContent = 'PILIH KATEGORI';
            contentObserver.disconnect();
          }
        });
      });
      contentObserver.observe(content, { attributes: true });

      if (content.style.display === 'block') {
        userListDiv.innerHTML = '';
        categoryTitle.textContent = 'PILIH KATEGORI';
      }
    })();
  </script>
  <noscript>
    <style>.splash { display: none; } #content { display: block; }</style>
  </noscript>
</body>
  </html>
